openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Freza Maket — multi-level catalog with order submission
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Customer order submissions
  - name: stats
    description: Aggregate stats for landing page
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List submitted orders (owner view)
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new order from the catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Aggregate stats for landing page
      responses:
        "200":
          description: Stats payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OrderItem:
      type: object
      properties:
        categoryId:
          type: string
          description: Top-level category (boxes | leather-cliche | wood-engraving | alphabets)
        subcategoryId:
          type: string
          description: Subcategory slug
        productId:
          type: string
          description: Specific product / variant slug
        productTitle:
          type: string
        sizeLabel:
          type: string
          description: Human readable size (e.g. "30x20x10 см")
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          description: Price per unit in UAH
        notes:
          type: string
          description: Optional per-item customer notes
      required:
        - categoryId
        - productId
        - productTitle
        - quantity
        - unitPrice

    CreateOrderBody:
      type: object
      properties:
        customerName:
          type: string
          minLength: 1
        customerPhone:
          type: string
          minLength: 1
        customerEmail:
          type: string
        deliveryCity:
          type: string
        deliveryNote:
          type: string
        paymentMethod:
          type: string
          description: "card | fop | prepayment"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
          minItems: 1
        attachmentName:
          type: string
          description: Filename of customer-uploaded artwork (vector or raster)
        attachmentDataUrl:
          type: string
          description: Base64 data URL of customer-uploaded artwork (small files only)
        message:
          type: string
          description: Free-form message from the customer
        totalPrice:
          type: number
          description: Computed total (UAH) sent from client
      required:
        - customerName
        - customerPhone
        - items
        - totalPrice

    Order:
      type: object
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
          nullable: true
        deliveryCity:
          type: string
          nullable: true
        deliveryNote:
          type: string
          nullable: true
        paymentMethod:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        attachmentName:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        totalPrice:
          type: number
        status:
          type: string
          description: "new | in_progress | done | cancelled"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - customerName
        - customerPhone
        - items
        - totalPrice
        - status
        - createdAt

    CategoryStat:
      type: object
      properties:
        categoryId:
          type: string
        label:
          type: string
        ordersCount:
          type: integer
      required:
        - categoryId
        - label
        - ordersCount

    Stats:
      type: object
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStat"
      required:
        - totalOrders
        - totalRevenue
        - byCategory
